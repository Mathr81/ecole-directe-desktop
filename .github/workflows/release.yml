name: Build & Release

on:
  push:
    tags:
      - "v*" # Déclenché sur les tags de type v1.2.3

permissions:
  contents: write # Nécessaire pour créer les GitHub Releases

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout du code ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup pnpm (AVANT Node pour que le cache fonctionne) ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # pnpm 10 = stable, compatible Node 22 LTS
          run_install: false

      # ── 3. Setup Node.js ──
      # setup-node gère le cache pnpm automatiquement quand pnpm est déjà installé
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # ── 4. Installer les dépendances ──
      # --frozen-lockfile garantit que le pnpm-lock.yaml est respecté à l'identique
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Build & publish ──
      # GH_TOKEN est automatiquement disponible dans les Actions GitHub
      # electron-builder va créer la Release et uploader le .exe + latest.yml
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run build -- --publish always

      # ── 6. Upload artifacts (optionnel, pour debug en cas d'échec) ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: dist/